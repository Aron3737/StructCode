<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StructCode</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>StructCode</h1>
    <p>GitHub 저장소를 분석하고 분류합니다</p>
  </header>

  <main>
    <div class="search-bar">
      <span class="prefix">github.com/</span>
      <input id="usernameInput" type="text" placeholder="사용자명 입력" />
      <button id="searchBtn" onclick="fetchRepos()">분석</button>
    </div>

    <div id="stats" class="stats hidden"></div>
    <div id="filters" class="filters hidden"></div>
    <div id="results" class="results"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
